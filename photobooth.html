<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>snapr • online photobooth</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Special+Elite&family=Courier+Prime&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --ink: #1a1a1a;
    --warm: #c4a882;
    --accent: #d4622a;
    --light-warm: #ede5d8;
    --sketch: #2a2a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    font-family: 'Caveat', cursive;
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* LANDING PAGE */
  #landing {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
  }

  .landing-title {
    font-family: 'Special Elite', monospace;
    font-size: clamp(3rem, 10vw, 7rem);
    letter-spacing: -2px;
    line-height: 1;
    text-align: center;
    margin-bottom: 0.5rem;
    position: relative;
  }

  .landing-title span {
    color: var(--accent);
  }

  .landing-subtitle {
    font-size: 1.4rem;
    color: #666;
    margin-bottom: 3rem;
    text-align: center;
  }

  /* Hand-drawn booth illustration */
  .booth-illustration {
    width: 220px;
    margin: 1rem auto 2.5rem;
    position: relative;
  }

  .booth-illustration svg {
    width: 100%;
    height: auto;
    filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.12));
  }

  /* Handwritten badge */
  .badge {
    background: white;
    border: 2px solid var(--ink);
    border-radius: 50%;
    width: 70px;
    height: 70px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Caveat', cursive;
    font-size: 0.75rem;
    line-height: 1.2;
    font-weight: 700;
    position: absolute;
    right: -20px;
    top: 40%;
    transform: rotate(12deg);
    box-shadow: 2px 2px 0 var(--ink);
  }

  .enter-btn {
    font-family: 'Special Elite', monospace;
    font-size: 1.1rem;
    padding: 1rem 2.5rem;
    background: var(--ink);
    color: var(--cream);
    border: 2px solid var(--ink);
    cursor: pointer;
    position: relative;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 4px 4px 0 var(--warm);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .enter-btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--warm);
  }

  .enter-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--warm);
  }

  .footer-note {
    margin-top: 3rem;
    font-size: 1rem;
    color: #999;
    text-align: center;
  }

  /* Featured strips on landing */
  .featured-label {
    font-size: 0.9rem;
    color: #888;
    margin-top: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .featured-label::before, .featured-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #ccc;
    width: 60px;
  }

  /* BOOTH PAGE */
  #booth {
    display: none;
    min-height: 100vh;
    padding: 2rem;
    position: relative;
  }

  .booth-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .booth-header h1 {
    font-family: 'Special Elite', monospace;
    font-size: 2rem;
    letter-spacing: 6px;
    text-transform: uppercase;
    border: 2px solid var(--ink);
    display: inline-block;
    padding: 0.4rem 1.5rem;
    box-shadow: 3px 3px 0 var(--warm);
    background: white;
  }

  .booth-layout {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 3rem;
    max-width: 900px;
    margin: 0 auto;
    align-items: start;
  }

  /* Camera area */
  .camera-section {
    position: relative;
  }

  .camera-frame {
    border: 3px solid var(--ink);
    background: var(--ink);
    position: relative;
    overflow: hidden;
    aspect-ratio: 4/3;
    box-shadow: 6px 6px 0 var(--warm);
  }

  .camera-frame::before {
    content: '';
    position: absolute;
    inset: 0;
    border: 8px solid transparent;
    border-image: repeating-linear-gradient(
      45deg,
      var(--ink) 0,
      var(--ink) 4px,
      transparent 4px,
      transparent 8px
    ) 8;
    z-index: 2;
    pointer-events: none;
  }

  #video, #snapshot-canvas {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transform: scaleX(-1);
  }

  #snapshot-canvas { display: none; }

  .eye-level-label {
    position: absolute;
    left: -70px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.9rem;
    color: var(--accent);
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    white-space: nowrap;
  }

  .eye-level-label::after {
    content: '→';
    font-size: 1.2rem;
  }

  /* Countdown overlay */
  .countdown-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.4);
    z-index: 10;
    display: none;
  }

  .countdown-number {
    font-family: 'Special Elite', monospace;
    font-size: 8rem;
    color: white;
    text-shadow: 0 0 20px rgba(255,255,255,0.8);
    animation: pulse 1s ease-in-out;
  }

  @keyframes pulse {
    0% { transform: scale(1.5); opacity: 0; }
    50% { transform: scale(1); opacity: 1; }
    100% { transform: scale(0.8); opacity: 0.8; }
  }

  .flash-overlay {
    position: absolute;
    inset: 0;
    background: white;
    z-index: 11;
    display: none;
    pointer-events: none;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-top: 1.2rem;
    flex-wrap: wrap;
  }

  .bw-toggle {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
  }

  .toggle-switch {
    width: 44px;
    height: 24px;
    background: #ddd;
    border: 2px solid var(--ink);
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
  }

  .toggle-switch.on { background: var(--ink); }

  .toggle-switch::after {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    background: white;
    border: 1px solid #999;
    top: 2px;
    left: 2px;
    transition: transform 0.2s;
  }

  .toggle-switch.on::after {
    transform: translateX(20px);
    border-color: var(--cream);
  }

  .start-btn {
    font-family: 'Special Elite', monospace;
    font-size: 1rem;
    padding: 0.7rem 2rem;
    background: var(--accent);
    color: white;
    border: 2px solid var(--ink);
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform 0.15s, box-shadow 0.15s;
    flex: 1;
  }

  .start-btn:hover {
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 var(--ink);
  }

  .start-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .photo-counter {
    font-size: 1rem;
    color: #666;
    font-weight: 700;
    white-space: nowrap;
  }

  /* Instructions */
  .instructions {
    background: white;
    border: 2px solid var(--ink);
    padding: 1rem 1.2rem;
    margin-top: 1rem;
    font-size: 0.95rem;
    line-height: 1.8;
    position: relative;
    box-shadow: 3px 3px 0 var(--light-warm);
  }

  .instructions::before {
    content: 'how it works';
    position: absolute;
    top: -12px;
    left: 12px;
    background: white;
    padding: 0 0.3rem;
    font-size: 0.8rem;
    color: #999;
    border: 1px solid #ddd;
  }

  .step {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
  }

  .step-num {
    font-family: 'Special Elite', monospace;
    font-size: 1.2rem;
    color: var(--accent);
    font-weight: 700;
    min-width: 20px;
  }

  /* PHOTO STRIP */
  .strip-section {
    width: 160px;
    flex-shrink: 0;
  }

  .strip-frame {
    border: 3px solid var(--ink);
    background: white;
    padding: 0.8rem 0.6rem;
    box-shadow: 4px 4px 0 var(--warm);
    position: relative;
    min-height: 400px;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .strip-slot {
    width: 100%;
    aspect-ratio: 4/3;
    background: var(--light-warm);
    border: 2px dashed #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    transition: all 0.3s;
  }

  .strip-slot.filled {
    border: 2px solid var(--ink);
  }

  .strip-slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .slot-empty-icon {
    font-size: 1.5rem;
    color: #ccc;
  }

  .strip-label {
    text-align: center;
    font-size: 0.75rem;
    color: #aaa;
    margin-top: 0.3rem;
    font-family: 'Courier Prime', monospace;
  }

  /* RESULT PAGE */
  #result {
    display: none;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 2rem;
    gap: 2rem;
  }

  .result-title {
    font-family: 'Special Elite', monospace;
    font-size: 2rem;
    text-align: center;
    letter-spacing: 2px;
  }

  .final-strip-wrapper {
    position: relative;
    display: inline-block;
  }

  #final-strip {
    border: 4px solid var(--ink);
    background: white;
    padding: 1rem 0.8rem 1.5rem;
    box-shadow: 8px 8px 0 var(--warm);
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 220px;
  }

  .final-photo {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
    border: 1px solid #ddd;
  }

  .strip-date {
    text-align: center;
    font-family: 'Courier Prime', monospace;
    font-size: 0.7rem;
    color: #999;
    margin-top: 0.3rem;
    letter-spacing: 1px;
  }

  .result-actions {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .action-btn {
    font-family: 'Special Elite', monospace;
    font-size: 0.9rem;
    padding: 0.7rem 1.8rem;
    border: 2px solid var(--ink);
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .action-btn.primary {
    background: var(--ink);
    color: white;
    box-shadow: 3px 3px 0 var(--accent);
  }

  .action-btn.secondary {
    background: white;
    color: var(--ink);
    box-shadow: 3px 3px 0 var(--warm);
  }

  .action-btn:hover {
    transform: translate(-1px, -1px);
  }

  .action-btn.primary:hover { box-shadow: 4px 4px 0 var(--accent); }
  .action-btn.secondary:hover { box-shadow: 4px 4px 0 var(--warm); }

  /* Decorative corner marks */
  .corner-tl, .corner-tr, .corner-bl, .corner-br {
    position: absolute;
    width: 16px;
    height: 16px;
    pointer-events: none;
  }
  .corner-tl { top: -2px; left: -2px; border-top: 3px solid var(--accent); border-left: 3px solid var(--accent); }
  .corner-tr { top: -2px; right: -2px; border-top: 3px solid var(--accent); border-right: 3px solid var(--accent); }
  .corner-bl { bottom: -2px; left: -2px; border-bottom: 3px solid var(--accent); border-left: 3px solid var(--accent); }
  .corner-br { bottom: -2px; right: -2px; border-bottom: 3px solid var(--accent); border-right: 3px solid var(--accent); }

  /* Photo number badge on strip */
  .photo-badge {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 18px;
    height: 18px;
    background: var(--accent);
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier Prime', monospace;
  }

  /* Responsive */
  @media (max-width: 680px) {
    .booth-layout {
      grid-template-columns: 1fr;
      gap: 2rem;
    }
    .strip-section {
      width: 100%;
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .strip-frame {
      flex-direction: row;
      width: 100%;
      min-height: unset;
      padding: 0.6rem;
    }
    .strip-slot {
      flex: 1;
    }
    .eye-level-label {
      display: none;
    }
  }

  .hidden { display: none !important; }

  /* Page transitions */
  .page { transition: opacity 0.3s; }
  .page.fade-out { opacity: 0; }

  /* Wiggle animation for "taking photo" */
  @keyframes wiggle {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-1deg); }
    75% { transform: rotate(1deg); }
  }

  .taking-photo {
    animation: wiggle 0.3s ease-in-out;
  }

  /* Delivered label */
  .delivered-badge {
    background: white;
    border: 2px solid var(--ink);
    font-size: 0.7rem;
    padding: 0.3rem 0.6rem;
    text-align: center;
    line-height: 1.3;
    margin-top: 0.3rem;
    font-family: 'Courier Prime', monospace;
  }
</style>
</head>
<body>

<!-- LANDING PAGE -->
<div id="landing" class="page">
  <div class="landing-title">snap<span>r</span></div>
  <div class="landing-subtitle">online photobooth • free • instant</div>

  <div class="booth-illustration">
    <svg viewBox="0 0 200 260" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Booth body -->
      <rect x="20" y="30" width="160" height="200" rx="4" stroke="#1a1a1a" stroke-width="3" fill="white"/>
      <!-- Sign on top -->
      <rect x="35" y="10" width="130" height="28" rx="2" stroke="#1a1a1a" stroke-width="2.5" fill="#f5f0e8"/>
      <text x="100" y="28" text-anchor="middle" font-family="'Special Elite', monospace" font-size="11" fill="#1a1a1a" letter-spacing="3">PHOTOBOOTH</text>
      <!-- Curtains -->
      <path d="M20 30 Q40 60 20 90" stroke="#1a1a1a" stroke-width="2" fill="#e8ddd0"/>
      <path d="M180 30 Q160 60 180 90" stroke="#1a1a1a" stroke-width="2" fill="#e8ddd0"/>
      <!-- Camera lens -->
      <circle cx="100" cy="85" r="18" stroke="#1a1a1a" stroke-width="2.5" fill="#f5f0e8"/>
      <circle cx="100" cy="85" r="11" stroke="#1a1a1a" stroke-width="2" fill="#ddd"/>
      <circle cx="100" cy="85" r="5" fill="#1a1a1a"/>
      <circle cx="103" cy="82" r="2" fill="white" opacity="0.6"/>
      <!-- Flash -->
      <rect x="78" y="64" width="8" height="5" rx="1" stroke="#1a1a1a" stroke-width="1.5" fill="white"/>
      <!-- Stool -->
      <ellipse cx="100" cy="210" rx="30" ry="6" stroke="#1a1a1a" stroke-width="2" fill="#e8ddd0"/>
      <line x1="100" y1="216" x2="100" y2="240" stroke="#1a1a1a" stroke-width="2.5"/>
      <ellipse cx="100" cy="240" rx="18" ry="4" stroke="#1a1a1a" stroke-width="2" fill="#e8ddd0"/>
      <!-- Strip output -->
      <rect x="60" y="155" width="40" height="60" rx="2" stroke="#1a1a1a" stroke-width="2" fill="#f5f0e8"/>
      <rect x="63" y="158" width="34" height="12" fill="#ddd" rx="1"/>
      <rect x="63" y="173" width="34" height="12" fill="#ddd" rx="1"/>
      <rect x="63" y="188" width="34" height="12" fill="#ddd" rx="1"/>
      <rect x="63" y="203" width="34" height="7" fill="#ddd" rx="1"/>
      <!-- Delivered label -->
      <rect x="110" y="160" width="52" height="36" rx="2" stroke="#1a1a1a" stroke-width="2" fill="white"/>
      <text x="136" y="172" text-anchor="middle" font-family="'Courier Prime', monospace" font-size="6.5" fill="#1a1a1a">PHOTOS</text>
      <text x="136" y="181" text-anchor="middle" font-family="'Courier Prime', monospace" font-size="6.5" fill="#1a1a1a">DELIVERED</text>
      <text x="136" y="190" text-anchor="middle" font-family="'Courier Prime', monospace" font-size="6.5" fill="#1a1a1a">IN 0 SECS</text>
    </svg>
    <div class="badge">$0<br>=<br>4 pics</div>
  </div>

  <button class="enter-btn" onclick="enterBooth()">enter →</button>

  <div class="footer-note">made with ♥ • no sign-up needed</div>
</div>

<!-- BOOTH PAGE -->
<div id="booth" class="page">
  <div class="booth-header">
    <h1>📷 PHOTOBOOTH</h1>
  </div>

  <div class="booth-layout">
    <!-- Camera section -->
    <div class="camera-section">
      <div style="position:relative">
        <div class="eye-level-label">eye level</div>
        <div class="camera-frame" id="camera-frame">
          <video id="video" autoplay playsinline></video>
          <canvas id="snapshot-canvas"></canvas>
          <div class="countdown-overlay" id="countdown-overlay">
            <div class="countdown-number" id="countdown-number">3</div>
          </div>
          <div class="flash-overlay" id="flash-overlay"></div>
          <div class="corner-tl"></div>
          <div class="corner-tr"></div>
          <div class="corner-bl"></div>
          <div class="corner-br"></div>
        </div>
      </div>

      <div class="controls">
        <label class="bw-toggle" onclick="toggleBW()">
          <span>b&w</span>
          <div class="toggle-switch" id="bw-toggle"></div>
        </label>
        <button class="start-btn" id="start-btn" onclick="startSession()">start →</button>
        <div class="photo-counter" id="photo-counter"></div>
      </div>

      <div class="instructions">
        <div class="step"><span class="step-num">1</span><span>Toggle b&w or color with the switch</span></div>
        <div class="step"><span class="step-num">2</span><span>Hit <b>start</b> — 4 photos with countdown</span></div>
        <div class="step"><span class="step-num">3</span><span>Select frames, download your strip!</span></div>
      </div>
    </div>

    <!-- Strip preview -->
    <div class="strip-section">
      <div class="strip-frame" id="strip-frame">
        <div class="strip-slot" id="slot-0"><span class="slot-empty-icon">○</span></div>
        <div class="strip-slot" id="slot-1"><span class="slot-empty-icon">○</span></div>
        <div class="strip-slot" id="slot-2"><span class="slot-empty-icon">○</span></div>
        <div class="strip-slot" id="slot-3"><span class="slot-empty-icon">○</span></div>
        <div class="delivered-badge">PHOTOS DELIVERED<br>IN 0 SECONDS</div>
      </div>
      <div class="strip-label">your strip</div>
    </div>
  </div>
</div>

<!-- RESULT PAGE -->
<div id="result" class="page" style="display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem; gap:1.5rem;">
  <div class="result-title">✨ your strip is ready!</div>

  <div class="final-strip-wrapper">
    <div id="final-strip">
      <!-- photos inserted here -->
      <div class="strip-date" id="strip-date"></div>
    </div>
  </div>

  <div class="result-actions">
    <button class="action-btn primary" onclick="downloadStrip()">↓ download</button>
    <button class="action-btn secondary" onclick="retake()">↺ retake</button>
  </div>
</div>

<script>
  let stream = null;
  let photos = [];
  let bwMode = false;
  let currentPhoto = 0;
  const TOTAL_PHOTOS = 4;

  async function enterBooth() {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('booth').style.display = 'block';
    await startCamera();
  }

  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 1280, height: 720 }, audio: false });
      const video = document.getElementById('video');
      video.srcObject = stream;
    } catch(e) {
      alert('Camera access needed! Please allow camera permissions and refresh.');
    }
  }

  function toggleBW() {
    bwMode = !bwMode;
    const toggle = document.getElementById('bw-toggle');
    const video = document.getElementById('video');
    toggle.classList.toggle('on', bwMode);
    video.style.filter = bwMode ? 'grayscale(1) contrast(1.1)' : '';
  }

  async function startSession() {
    if (photos.length > 0) resetStrip();
    const btn = document.getElementById('start-btn');
    btn.disabled = true;
    currentPhoto = 0;
    photos = [];

    for (let i = 0; i < TOTAL_PHOTOS; i++) {
      await countdown();
      await takePhoto(i);
      if (i < TOTAL_PHOTOS - 1) await sleep(800);
    }

    btn.disabled = false;
    document.getElementById('photo-counter').textContent = '';
    showResult();
  }

  function countdown() {
    return new Promise(resolve => {
      const overlay = document.getElementById('countdown-overlay');
      const num = document.getElementById('countdown-number');
      overlay.style.display = 'flex';
      let count = 3;
      num.textContent = count;

      const interval = setInterval(() => {
        count--;
        if (count === 0) {
          num.textContent = '📸';
          clearInterval(interval);
          setTimeout(() => {
            overlay.style.display = 'none';
            resolve();
          }, 400);
        } else {
          num.textContent = count;
          num.style.animation = 'none';
          num.offsetHeight; // reflow
          num.style.animation = 'pulse 1s ease-in-out';
        }
      }, 1000);
    });
  }

  async function takePhoto(index) {
    const video = document.getElementById('video');
    const canvas = document.getElementById('snapshot-canvas');
    const flash = document.getElementById('flash-overlay');
    const counter = document.getElementById('photo-counter');

    // Flash
    flash.style.display = 'block';
    flash.style.opacity = '1';
    setTimeout(() => {
      flash.style.transition = 'opacity 0.4s';
      flash.style.opacity = '0';
      setTimeout(() => { flash.style.display = 'none'; flash.style.transition = ''; }, 400);
    }, 50);

    // Capture
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    const ctx = canvas.getContext('2d');
    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
    ctx.restore();

    if (bwMode) {
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      for (let i = 0; i < data.length; i += 4) {
        const gray = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
        data[i] = data[i+1] = data[i+2] = gray;
      }
      ctx.putImageData(imageData, 0, 0);
    }

    const dataURL = canvas.toDataURL('image/jpeg', 0.92);
    photos.push(dataURL);
    counter.textContent = `${index + 1} / ${TOTAL_PHOTOS}`;

    // Update strip slot
    const slot = document.getElementById(`slot-${index}`);
    slot.innerHTML = `<img src="${dataURL}" alt="photo ${index+1}"><div class="photo-badge">${index+1}</div>`;
    slot.classList.add('filled');
    slot.classList.add('taking-photo');
    setTimeout(() => slot.classList.remove('taking-photo'), 300);
  }

  function showResult() {
    document.getElementById('booth').style.display = 'none';
    const result = document.getElementById('result');
    result.style.display = 'flex';

    const strip = document.getElementById('final-strip');
    // Remove old photos
    strip.querySelectorAll('.final-photo').forEach(el => el.remove());

    const dateEl = document.getElementById('strip-date');
    photos.forEach(src => {
      const img = document.createElement('img');
      img.src = src;
      img.className = 'final-photo';
      strip.insertBefore(img, dateEl);
    });

    const now = new Date();
    dateEl.textContent = now.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }).toUpperCase();
  }

  async function downloadStrip() {
    const strip = document.getElementById('final-strip');

    // Use html2canvas-like approach with canvas
    const W = 220, PH = Math.round(W * 3/4), GAP = 6, PAD_X = 12, PAD_TOP = 16, PAD_BOT = 36;
    const totalH = PAD_TOP + TOTAL_PHOTOS * PH + (TOTAL_PHOTOS - 1) * GAP + PAD_BOT;

    const canvas = document.createElement('canvas');
    canvas.width = W * 2;
    canvas.height = totalH * 2;
    const ctx = canvas.getContext('2d');
    ctx.scale(2, 2);

    // Background
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, W, totalH);

    // Border
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 3;
    ctx.strokeRect(1.5, 1.5, W - 3, totalH - 3);

    // Draw photos
    const loadImg = src => new Promise(res => { const i = new Image(); i.onload = () => res(i); i.src = src; });

    for (let i = 0; i < photos.length; i++) {
      const img = await loadImg(photos[i]);
      const y = PAD_TOP + i * (PH + GAP);
      ctx.drawImage(img, PAD_X, y, W - PAD_X * 2, PH);
      ctx.strokeStyle = '#ddd';
      ctx.lineWidth = 1;
      ctx.strokeRect(PAD_X, y, W - PAD_X * 2, PH);
    }

    // Date
    ctx.fillStyle = '#999';
    ctx.font = '9px Courier New';
    ctx.textAlign = 'center';
    const now = new Date();
    ctx.fillText(now.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }).toUpperCase(), W/2, totalH - 12);

    // snapr label
    ctx.fillStyle = '#1a1a1a';
    ctx.font = 'bold 11px Courier New';
    ctx.fillText('snapr', W/2, totalH - 22);

    const link = document.createElement('a');
    link.download = `snapr-${Date.now()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  function retake() {
    document.getElementById('result').style.display = 'none';
    document.getElementById('booth').style.display = 'block';
    resetStrip();
  }

  function resetStrip() {
    for (let i = 0; i < TOTAL_PHOTOS; i++) {
      const slot = document.getElementById(`slot-${i}`);
      slot.innerHTML = '<span class="slot-empty-icon">○</span>';
      slot.classList.remove('filled');
    }
    photos = [];
    document.getElementById('photo-counter').textContent = '';
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
